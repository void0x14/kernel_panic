<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Panic — Memory OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: monospace; color: #C8C8C8; }
        canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }

        .panel {
            position: absolute;
            background: rgba(10, 10, 10, 0.75);
            border: 1px solid rgba(200, 200, 200, 0.15);
            padding: 12px;
            pointer-events: auto;
            z-index: 10;
        }

        .panel-label {
            color: #00C8FF;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        /* Top-left: branch list */
        #kp-panel-branches {
            top: 12px;
            left: 12px;
            min-width: 160px;
        }

        /* Top-right: panic scores */
        #kp-panel-panic {
            top: 12px;
            right: 12px;
            min-width: 180px;
        }

        /* Mid-right: scene metadata */
        #kp-panel-scene {
            top: 124px;
            right: 12px;
            width: 240px;
        }

        .scene-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
            font-size: 11px;
        }

        .scene-key {
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scene-value {
            color: #C8C8C8;
            text-align: right;
            word-break: break-word;
        }

        .panic-alert {
            color: #FF1A1A;
            font-weight: bold;
            animation: panic-blink 0.5s infinite;
        }
        @keyframes panic-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Bottom-left: text input */
        #kp-panel-text {
            bottom: 12px;
            left: 12px;
            width: 380px;
        }

        #kp-memory-text {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(200, 200, 200, 0.2);
            color: #C8C8C8;
            font-family: monospace;
            font-size: 13px;
            padding: 8px;
            resize: none;
            outline: none;
        }
        #kp-memory-text:focus {
            border-color: #00C8FF;
        }

        #kp-inject {
            margin-top: 6px;
            padding: 6px 18px;
            background: rgba(0, 200, 255, 0.15);
            border: 1px solid #00C8FF;
            color: #00C8FF;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #kp-inject:hover {
            background: rgba(0, 200, 255, 0.3);
        }

        .inject-hint {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }

        #kp-panel-audio {
            bottom: 124px;
            right: 12px;
            width: 320px;
        }

        .audio-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .audio-btn {
            padding: 6px 12px;
            background: rgba(0, 200, 255, 0.1);
            border: 1px solid rgba(200, 200, 200, 0.2);
            color: #C8C8C8;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .audio-btn:hover:not(:disabled) {
            background: rgba(0, 200, 255, 0.25);
            border-color: #00C8FF;
        }

        .audio-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #kp-audio-preview {
            width: 100%;
            margin-top: 8px;
        }

        .audio-status {
            margin-top: 8px;
            font-size: 11px;
            color: #8ea4ad;
            min-height: 28px;
            line-height: 1.4;
        }

        /* Bottom-right: file inputs */
        #kp-panel-files {
            bottom: 12px;
            right: 12px;
            width: 240px;
        }

        .file-input-group {
            margin-bottom: 8px;
        }

        .file-btn {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(0, 200, 255, 0.1);
            border: 1px solid rgba(200, 200, 200, 0.2);
            color: #C8C8C8;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .file-btn:hover {
            background: rgba(0, 200, 255, 0.25);
            border-color: #00C8FF;
        }

        .file-input-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <!-- Top-left: Branch list -->
    <div id="kp-panel-branches" class="panel">
        <div class="panel-label">BRANCHES</div>
        <div id="kp-branch-list">
            <div style="color:#FFFFFF">b0</div>
        </div>
    </div>

    <!-- Top-right: Panic scores -->
    <div id="kp-panel-panic" class="panel">
        <div class="panel-label">PANIC SCORES</div>
        <div id="kp-panic-scores">
            <div>b0: 0.0000</div>
        </div>
    </div>

    <div id="kp-panel-scene" class="panel">
        <div class="panel-label">SCENE DATA</div>
        <div id="kp-scene-data">
            <div class="scene-row"><span class="scene-key">source</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">location</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">time</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">weather</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">atmosphere</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">valence</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">intensity</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">llm_status</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">latency_ms</span><span class="scene-value">-</span></div>
            <div class="scene-row"><span class="scene-key">fallback_reason</span><span class="scene-value">-</span></div>
        </div>
    </div>

    <!-- Bottom-left: Free text input -->
    <div id="kp-panel-text" class="panel">
        <div class="panel-label">ENTER MEMORY</div>
        <textarea id="kp-memory-text" placeholder="Anını yaz... (örn: 2019 yaz Istanbul arkadaşımla tartıştım çok sinirliydim)"></textarea>
        <button id="kp-inject">INJECT</button>
        <div class="inject-hint">Ctrl+Enter to inject</div>
    </div>

    <div id="kp-panel-audio" class="panel">
        <div class="panel-label">AUDIO PREVIEW</div>
        <div class="file-input-group">
            <label class="file-btn" for="kp-audio-file">LOAD AUDIO FILE</label>
            <input id="kp-audio-file" class="file-input-hidden" type="file" accept="audio/*">
        </div>
        <div class="audio-controls">
            <button id="kp-audio-record" class="audio-btn">START REC</button>
            <button id="kp-audio-stop" class="audio-btn" disabled>STOP</button>
            <button id="kp-audio-submit" class="audio-btn" disabled>SUBMIT</button>
            <button id="kp-audio-reset" class="audio-btn" disabled>RESET</button>
        </div>
        <audio id="kp-audio-preview" controls hidden></audio>
        <div id="kp-audio-status" class="audio-status">Idle. Load a file or record audio, preview it, then submit manually.</div>
    </div>

    <!-- Bottom-right: File inputs -->
    <div id="kp-panel-files" class="panel">
        <div class="panel-label">IMPORT HISTORY</div>
        <div class="file-input-group">
            <label class="file-btn" for="kp-chatgpt-file">LOAD CHATGPT EXPORT</label>
            <input id="kp-chatgpt-file" class="file-input-hidden" type="file" accept=".json">
        </div>
        <div class="file-input-group">
            <label class="file-btn" for="kp-gemini-file">LOAD GEMINI EXPORT</label>
            <input id="kp-gemini-file" class="file-input-hidden" type="file" accept=".json">
        </div>
    </div>

    <script src="gfx.js"></script>
    <script src="llm-fixtures.js?v=20260327"></script>
    <script src="llm.js?v=20260327"></script>
    <script src="parser.js?v=20260327"></script>
</body>
</html>
